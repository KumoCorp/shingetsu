[workspace]
members = [
    "crates/shingetsu",
    "crates/shingetsu-compiler",
    "crates/shingetsu-vm",
]
resolver = "3"

[workspace.dependencies]
anyhow = "1.0"
async-trait = "0.1"
bstr = "1.12.1"
bytes = "1"
clap = { version = "4", features = ["derive"] }
dashmap = "6"
full_moon = { version = "2.1.1", features = ["lua52", "lua54", "luau"] }
futures = "0.3"
k9 = "0.12"
shingetsu-compiler = { path = "crates/shingetsu-compiler" }
shingetsu-vm = { path = "crates/shingetsu-vm" }
thiserror = "2"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "sync"] }
