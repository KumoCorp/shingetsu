    <circle cx="24.8" cy="35.7" r="2.05" fill="none" stroke="#3A2A78" stroke-width="0.4" opacity="0.5"></circle>
    <circle cx="40.6" cy="25.8" r="1.45" fill="#000" opacity="0.4"></circle>
    <circle cx="34.1" cy="41.2" r="1.25" fill="#000" opacity="0.35"></circle>
